<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP8 — Ferrari (Bootstrap)</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Our Theme -->
    <link rel="stylesheet" href="../dbz-internal.css">
    <style>
        /* Override Bootstrap for theme alignment */
        .navbar {
            background: rgba(10, 10, 10, 0.95) !important;
            border-bottom: 1px solid var(--st-red-bright);
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: var(--st-red) !important;
            border-color: var(--st-red-bright) !important;
            font-family: 'Benguiat', serif;
            text-transform: uppercase;
        }

        .display-1 {
            font-family: 'Benguiat', serif;
            color: var(--st-red-bright);
            text-shadow: 0 0 20px rgba(255, 23, 68, 0.5);
        }

        .lead {
            color: var(--st-text);
        }

        .nav-link {
            font-family: 'Benguiat', serif;
            letter-spacing: 1px;
        }

        .portfolio-container {
            background: transparent;
            border: none;
            box-shadow: none;
            padding-top: 100px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html"
                style="font-family: 'Benguiat', serif; color: var(--st-red-bright);">
                🏎️ FERRARI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="menu" class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Modèles</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Histoire</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html" style="color: var(--st-red-glow);">←
                            Retour Portfolio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="portfolio-container">
        <section class="py-5 text-center">
            <div class="container">
                <h1 class="display-1 fw-bold mb-4">Bienvenue chez Ferrari</h1>
                <p class="lead mb-5">La quintessence de la performance italienne, désormais disponible dans l'Upside
                    Down.</p>
                <img src="https://img.freepik.com/vecteurs-libre/vecteur-conception-degrade-colore-oiseau_343694-2506.jpg?semt=ais_hybrid&w=740&q=80"
                    alt="Logo" width="120" class="mb-5"
                    style="border-radius: 50%; border: 2px solid var(--st-red-bright); box-shadow: 0 0 20px var(--st-red-glow);">
                <br>
                <a class="btn btn-primary btn-lg px-5 py-3">Découvrir la Gamme</a>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
