<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Zoo - Ajouter un employe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>Zoo</h2>
        <a href="menu_admin.php">Dashboard</a>
        <a href="liste_employes.php">Employes</a>
        <a href="logout.php">Deconnexion</a>
    </div>

    <div class="contenu">
        <h1>Ajouter un employe</h1>

        <form method="post" action="traitement_ajout_employe.php">
            <div class="form-group">
                <label>Nom :</label>
                <input type="text" name="nom" required>
            </div>
            <div class="form-group">
                <label>Prenom :</label>
                <input type="text" name="prenom" required>
            </div>
            <div class="form-group">
                <label>Date de naissance :</label>
                <input type="date" name="date_naissance" required>
            </div>
            <div class="form-group">
                <label>Sexe :</label>
                <select name="sexe">
                    <option value="H">H</option>
                    <option value="F">F</option>
                </select>
            </div>
            <div class="form-group">
                <label>Login :</label>
                <input type="text" name="login" required>
            </div>
            <div class="form-group">
                <label>Mot de passe :</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Salaire :</label>
                <input type="text" name="salaire" required>
            </div>
            <div class="form-group">
                <label>Fonction :</label>
                <select name="fonction">
                    <option value="Employe">Employe</option>
                    <option value="Directeur">Directeur</option>
                </select>
            </div>
            <button type="submit" class="btn">Enregistrer</button>
        </form>
    </div>

</div>
</body>
</html>
