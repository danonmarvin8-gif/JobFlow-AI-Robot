# ============================================================
# JobFlow-AI — GitHub Actions Automated Pipeline
# Runs every 15 minutes to scrape, enrich, tailor, and send
# ============================================================

name: JobFlow-AI Pipeline

on:
  # Automatic schedule: every 15 min during business hours (8h-22h Paris time = 6h-20h UTC)
  schedule:
    - cron: '*/15 6-20 * * 1-5'   # Weekdays only, business hours
    - cron: '0 8-18 * * 6'        # Saturday, every hour
    # Sunday: rest (no emails to avoid spam flags)

  # Manual trigger
  workflow_dispatch:
    inputs:
      max_offers:
        description: 'Max offers to process'
        required: false
        default: '10'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          playwright install chromium --with-deps

      - name: Create .env file
        run: |
          cat << EOF > .env
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          HUNTER_API_KEY=${{ secrets.HUNTER_API_KEY }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          BREVO_SMTP_LOGIN=${{ secrets.BREVO_SMTP_LOGIN }}
          BREVO_SMTP_PASSWORD=${{ secrets.BREVO_SMTP_PASSWORD }}
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          SENDER_NAME=Marvin BOTTI DANON
          DATABASE_URL=sqlite:///./jobflow.db
          MAX_DAILY_EMAILS=30
          PREFERRED_LOCATIONS=${{ vars.PREFERRED_LOCATIONS || 'Paris 1er,Paris 2e,Paris 3e,Paris 4e,Paris 5e,Paris 6e,Paris 7e,Paris 8e,Paris 9e,Paris 16e,Paris 17e,Neuilly-sur-Seine,Boulogne-Billancourt,Levallois-Perret,Issy-les-Moulineaux,La Défense' }}
          AVOID_LOCATIONS=${{ vars.AVOID_LOCATIONS || 'Saint-Denis,Aubervilliers,La Courneuve,Pierrefitte,Stains,Bobigny,Bondy,Sevran,Aulnay-sous-Bois,Clichy-sous-Bois,Montfermeil' }}
          EOF

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: jobflow.db
          key: jobflow-db-${{ github.run_number }}
          restore-keys: |
            jobflow-db-

      - name: Run pipeline
        working-directory: server
        env:
          PYTHONPATH: .
        run: |
          python -m tasks.orchestrator

      - name: Save database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jobflow-database
          path: jobflow.db
          retention-days: 30

      - name: Save generated CVs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-cvs
          path: storage/generated_cvs/
          retention-days: 30

      - name: Commit database updates
        if: success()
        run: |
          git config user.name "JobFlow-AI Bot"
          git config user.email "bot@jobflow-ai.local"
          git add jobflow.db || true
          git diff --staged --quiet || git commit -m "🤖 Pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ) — auto-update database"
          git push || echo "Push failed (likely concurrent run)"
