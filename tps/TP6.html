<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP6 — Contact</title>
    <link rel="stylesheet" href="../assets/internal-style.css">
<script src="../assets/theme-switcher.js"></script></head>

<body>

    <div class="portfolio-container">
        <a href="../index.html" class="back-btn">⇠ Retour au Portail</a>

        <h1>Recontactez-nous !</h1>

        <form>
            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" placeholder="Jim Hopper">

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" placeholder="hopper@hawkins.pd">

            <label for="tel">Téléphone :</label>
            <input type="number" id="tel" name="tel" placeholder="0123456789">

            <label for="message">Message :</label>
            <textarea name="message" id="message" rows="4" placeholder="Entrez votre message ici..."></textarea>

            <div style="text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <input type="submit" value="Envoyer">
            </div>
        </form>
    </div>

</body>

</html>
