<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP5 — Formulaire de Contact</title>
    <link rel="stylesheet" href="../assets/internal-style.css">
<script src="../assets/theme-switcher.js"></script></head>

<body>

    <div class="portfolio-container">
        <a href="../index.html" class="back-btn">⇠ Retour au Portail</a>

        <h1>Formulaire d'Inscription</h1>

        <form>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="t1" placeholder="Exploration Team">
                </div>
                <div>
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="t2" placeholder="Dustin">
                </div>
            </div>

            <label for="pass">Mot de passe</label>
            <input type="password" id="pass" name="t3" placeholder="••••••••">

            <label for="adr">Adresse</label>
            <textarea id="adr" name="t4" rows="4" placeholder="Hawkins, Indiana"></textarea>

            <label for="ville">Ville</label>
            <select id="ville">
                <option>Hawkins</option>
                <option>Paris</option>
                <option>Créteil</option>
                <option>Nice</option>
            </select>

            <label>Situation</label>
            <div style="margin-bottom: 20px; display: flex; gap: 20px;">
                <label
                    style="font-family: inherit; color: inherit; font-size: inherit; display: inline-flex; align-items: center; gap: 5px;">
                    <input type="radio" name="r1"> Boursier
                </label>
                <label
                    style="font-family: inherit; color: inherit; font-size: inherit; display: inline-flex; align-items: center; gap: 5px;">
                    <input type="radio" name="r1"> Alternance
                </label>
                <label
                    style="font-family: inherit; color: inherit; font-size: inherit; display: inline-flex; align-items: center; gap: 5px;">
                    <input type="radio" name="r1"> Aucun
                </label>
            </div>

            <label>Hobbies</label>
            <div style="margin-bottom: 30px; display: flex; gap: 20px; flex-wrap: wrap;">
                <label
                    style="font-family: inherit; color: inherit; font-size: inherit; display: inline-flex; align-items: center; gap: 5px;">
                    <input type="checkbox" name="c1"> Lecture
                </label>
                <label
                    style="font-family: inherit; color: inherit; font-size: inherit; display: inline-flex; align-items: center; gap: 5px;">
                    <input type="checkbox" name="c2"> Sport
                </label>
                <label
                    style="font-family: inherit; color: inherit; font-size: inherit; display: inline-flex; align-items: center; gap: 5px;">
                    <input type="checkbox" name="c3"> Jeux Vidéos
                </label>
            </div>

            <div style="text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <input type="submit" value="Enregistrer">
                <input type="reset" value="Réinitialiser">
            </div>
        </form>
    </div>

</body>

</html>
