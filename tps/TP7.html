<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP7 — Calculatrice JS</title>
    <link rel="stylesheet" href="../assets/internal-style.css">
    <link rel="stylesheet" href="TP7_style.css">
    <script src="TP7_script.js"></script>
<script src="../assets/theme-switcher.js"></script></head>

<body>

    <div class="portfolio-container">
        <a href="../index.html" class="back-btn">⇠ Retour au Portail</a>

        <h1>Calculatrice JavaScript</h1>

        <div
            style="background: rgba(0,0,0,0.3); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,23,68,0.2);">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <input type="text" name="t1" id="t1" placeholder="Nombre 1">
                <input type="text" name="t2" id="t2" placeholder="Nombre 2">
            </div>

            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px;">
                <button onclick="somme()">+</button>
                <button onclick="soustraction()">-</button>
                <button onclick="division()">/</button>
                <button onclick="multiplication()">x</button>
            </div>

            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 30px;">
                <button onclick="pair()">Test Parité</button>
                <button onclick="permute()">Permuter</button>
            </div>

            <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <label>Résultat :</label>
                <input type="text" name="t3" id="t3" placeholder="---" readonly
                    style="background: rgba(183, 28, 28, 0.1); color: var(--st-red-bright); font-weight: 800; font-family: monospace; font-size: 1.5rem; text-align: center;">

                <label>Parité :</label>
                <input type="text" name="t4" id="pair" placeholder="Pair / Impair" readonly style="text-align: center;">
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button onclick="clearAll()"
                    style="background: transparent; border-color: var(--st-text-muted); color: var(--st-text-muted);">Effacer
                    Tout</button>
            </div>
        </div>

        <p style="margin-top: 40px; color: var(--st-text-muted); font-style: italic; text-align: center;">
            "Ce TP nous a appris à manipuler le DOM et les fonctions JavaScript pour créer une interface interactive."
        </p>
    </div>

</body>

</html>
